name: dr-db

x-mathesar-config: &mathesar-config
  DOMAIN_NAME: ${MATHESAR_DOMAIN_NAME:?Set MATHESAR_DOMAIN_NAME in .env}
  POSTGRES_DB: ${MATHESAR_METADATA_POSTGRES_DB:?Set MATHESAR_METADATA_POSTGRES_DB in .env}
  POSTGRES_USER: ${MATHESAR_METADATA_POSTGRES_USER:?Set MATHESAR_METADATA_POSTGRES_USER in .env}
  POSTGRES_PASSWORD: ${MATHESAR_METADATA_POSTGRES_PASSWORD:?Set MATHESAR_METADATA_POSTGRES_PASSWORD in .env}
  POSTGRES_HOST: ${MATHESAR_METADATA_POSTGRES_HOST:?Set MATHESAR_METADATA_POSTGRES_HOST in .env}
  POSTGRES_PORT: ${MATHESAR_METADATA_POSTGRES_PORT:?Set MATHESAR_METADATA_POSTGRES_PORT in .env}
  POSTGRES_SSLMODE: ${MATHESAR_METADATA_POSTGRES_SSLMODE:?Set MATHESAR_METADATA_POSTGRES_SSLMODE in .env}
  FILE_STORAGE_DICT: ${FILE_STORAGE_DICT:-{}}
  SSO_CONFIG_DICT: ${SSO_CONFIG_DICT:-{}}
  OIDC_CONFIG_DICT: ${OIDC_CONFIG_DICT:-{}}
  REQUIRE_SSO_LOGIN: ${REQUIRE_SSO_LOGIN:-false}

services:
  postgres:
    networks:
      default:
        aliases:
          - dr-db

  mathesar-metadata:
    image: pgautoupgrade/pgautoupgrade:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MATHESAR_METADATA_POSTGRES_DB:?Set MATHESAR_METADATA_POSTGRES_DB in .env}
      POSTGRES_USER: ${MATHESAR_METADATA_POSTGRES_USER:?Set MATHESAR_METADATA_POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${MATHESAR_METADATA_POSTGRES_PASSWORD:?Set MATHESAR_METADATA_POSTGRES_PASSWORD in .env}
    expose:
      - "5432"
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/pgdata
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 1s
      retries: 30
      start_period: 5s

  mathesar:
    image: mathesar/mathesar:latest
    restart: unless-stopped
    environment:
      <<: *mathesar-config
      DJANGO_SETTINGS_MODULE: config.settings.production
      ALLOWED_HOSTS: ${MATHESAR_ALLOWED_HOSTS:?Set MATHESAR_ALLOWED_HOSTS in .env}
      DEBUG: ${MATHESAR_DEBUG:-false}
      SECRET_KEY: ${MATHESAR_SECRET_KEY-}
      WEB_CONCURRENCY: ${MATHESAR_WEB_CONCURRENCY:-3}
      PER_USER_DATABASES_ENABLED: ${MATHESAR_PER_USER_DATABASES_ENABLED:-false}
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/static
        target: /code/static
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/media
        target: /code/.media
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/secrets
        target: /code/.secrets
    depends_on:
      mathesar-metadata:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s

  mathesar-proxy:
    image: mathesar/mathesar-caddy:latest
    restart: unless-stopped
    environment:
      <<: *mathesar-config
    ports:
      - "${MATHESAR_HOST_PORT:?Set MATHESAR_HOST_PORT in .env}:80"
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/media
        target: /code/.media
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/static
        target: /code/static
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/caddy
        target: /data
    depends_on:
      mathesar:
        condition: service_healthy
