name: dr-db

x-postgres-env: &postgres-env
  POSTGRES_DB: ${MATHESAR_POSTGRES_DB:-mathesar_django}
  POSTGRES_USER: ${POSTGRES_USER:-dr_db_admin}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
  DR_DB_APP_DB: ${DR_DB_APP_DB:-dr_db}

x-mathesar-env: &mathesar-env
  DOMAIN_NAME: ${MATHESAR_DOMAIN_NAME:-http://dr-db,http://localhost,http://127.0.0.1}
  POSTGRES_DB: ${MATHESAR_POSTGRES_DB:-mathesar_django}
  POSTGRES_USER: ${POSTGRES_USER:-dr_db_admin}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  FILE_STORAGE_DICT: ${FILE_STORAGE_DICT:-{}}
  OIDC_CONFIG_DICT: ${OIDC_CONFIG_DICT:-{}}

services:
  postgres:
    image: postgres:17-bookworm
    container_name: dr-db-postgres
    hostname: dr-db
    restart: unless-stopped
    environment:
      <<: *postgres-env
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_HOST_PORT:-7500}:5432"
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/postgres
        target: /var/lib/postgresql/data
      - type: bind
        source: ./docker/postgres/init
        target: /docker-entrypoint-initdb.d
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - dr-db

  mathesar:
    image: mathesar/mathesar:latest
    container_name: dr-db-mathesar
    restart: unless-stopped
    environment:
      <<: *mathesar-env
      DJANGO_SETTINGS_MODULE: config.settings.production
      ALLOWED_HOSTS: ${MATHESAR_ALLOWED_HOSTS:-dr-db,localhost,127.0.0.1,[::1]}
      DEBUG: ${MATHESAR_DEBUG:-false}
      SECRET_KEY: ${MATHESAR_SECRET_KEY-}
      WEB_CONCURRENCY: ${MATHESAR_WEB_CONCURRENCY:-3}
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/static
        target: /code/static
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/media
        target: /code/.media
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/secrets
        target: /code/.secrets
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s

  mathesar-proxy:
    image: mathesar/mathesar-caddy:latest
    container_name: dr-db-mathesar-proxy
    restart: unless-stopped
    environment:
      <<: *mathesar-env
    ports:
      - "${MATHESAR_HOST_PORT:-7000}:80"
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/media
        target: /code/.media
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/static
        target: /code/static
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/caddy
        target: /data
    depends_on:
      mathesar:
        condition: service_healthy
