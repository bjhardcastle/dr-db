name: dr-db

# The Postgres images require POSTGRES_* inside the container. The .env
# variables interpolated here are namespaced to match the Compose services.
x-dr-db-postgres-env: &dr-db-postgres-env
  POSTGRES_DB: ${DR_DB_POSTGRES_DB:-dr_db}
  POSTGRES_USER: ${DR_DB_POSTGRES_USER:-svc_neuropix}
  POSTGRES_PASSWORD: ${DR_DB_POSTGRES_PASSWORD:?Set DR_DB_POSTGRES_PASSWORD in .env}

x-mathesar-app-env: &mathesar-app-env
  FILE_STORAGE_DICT: ${FILE_STORAGE_DICT:-{}}
  OIDC_CONFIG_DICT: ${OIDC_CONFIG_DICT:-{}}

x-mathesar-metadata-postgres-env: &mathesar-metadata-postgres-env
  POSTGRES_DB: ${MATHESAR_METADATA_POSTGRES_DB:-mathesar_django}
  POSTGRES_USER: ${MATHESAR_METADATA_POSTGRES_USER:-mathesar}
  POSTGRES_PASSWORD: ${MATHESAR_METADATA_POSTGRES_PASSWORD:-mathesar}

services:
  dr-db-postgres:
    image: postgres:17-bookworm
    container_name: dr-db-postgres
    hostname: dr-db
    restart: unless-stopped
    environment:
      <<: *dr-db-postgres-env
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DR_DB_POSTGRES_HOST_PORT:-7500}:5432"
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - dr-db
          - dr-db-postgres

  mathesar-metadata-postgres:
    image: pgautoupgrade/pgautoupgrade:17-bookworm
    container_name: mathesar-metadata-postgres
    restart: unless-stopped
    environment:
      <<: *mathesar-metadata-postgres-env
    expose:
      - "5432"
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/pgdata
        target: /var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - mathesar-metadata-postgres

  mathesar:
    image: mathesar/mathesar:latest
    container_name: dr-db-mathesar
    restart: unless-stopped
    environment:
      <<: *mathesar-app-env
      DJANGO_SETTINGS_MODULE: config.settings.production
      ALLOWED_HOSTS: ${MATHESAR_ALLOWED_HOSTS:-dr-db,localhost,127.0.0.1,[::1]}
      DEBUG: ${MATHESAR_DEBUG:-false}
      SECRET_KEY: ${MATHESAR_SECRET_KEY-}
      WEB_CONCURRENCY: ${MATHESAR_WEB_CONCURRENCY:-3}
    volumes:
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/static
        target: /code/static
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/media
        target: /code/.media
      - type: bind
        source: ${DR_DB_STORAGE_ROOT:?Set DR_DB_STORAGE_ROOT in .env}/mathesar/secrets
        target: /code/.secrets
    depends_on:
      mathesar-metadata-postgres:
        condition: service_healthy
    ports:
      - "${MATHESAR_HOST_PORT:-7000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      default:
        aliases:
          - mathesar-app
